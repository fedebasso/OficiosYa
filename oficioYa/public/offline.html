<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sin conexión — OficioYa</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, -apple-system, sans-serif; background: #f4f4f2; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; text-align: center; }
    .logo { font-size: 24px; font-weight: 600; color: #0F6E56; margin-bottom: 16px; }
    .logo span { color: #9FE1CB; }
    .icon { font-size: 64px; margin-bottom: 16px; }
    h1 { font-size: 20px; color: #1a1a1a; margin-bottom: 8px; }
    p { font-size: 14px; color: #6b7280; margin-bottom: 24px; }
    button { background: #0F6E56; color: white; border: none; border-radius: 12px; padding: 12px 24px; font-size: 15px; font-weight: 500; cursor: pointer; }
    button:active { opacity: 0.9; }
  </style>
</head>
<body>
  <div class="logo">Oficio<span>Ya</span></div>
  <div class="icon">📡</div>
  <h1>Sin conexión</h1>
  <p>Parece que no hay internet. Revisá tu conexión e intentá de nuevo.</p>
  <button onclick="location.reload()">Reintentar</button>
</body>
</html>
