<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 248 80">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="248" y2="80" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#E8683A"/>
      <stop offset="50%"  stop-color="#B64A24"/>
      <stop offset="100%" stop-color="#2A2A2A"/>
    </linearGradient>
    <mask id="ring">
      <rect x="4"  y="4"  width="72" height="72" rx="19" fill="white"/>
      <rect x="17" y="17" width="46" height="46" rx="11" fill="black"/>
    </mask>
  </defs>

  <!-- O icon -->
  <rect x="4" y="4" width="72" height="72" rx="19" fill="url(#g)" mask="url(#ring)"/>

  <!-- "fix" text -->
  <text
    x="92"
    y="57"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-weight="800"
    font-size="54"
    letter-spacing="-1.5"
    fill="url(#g)"
  >fix</text>
</svg>
