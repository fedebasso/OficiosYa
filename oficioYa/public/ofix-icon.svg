<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1c1c1c;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#000000;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#111111;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="shineGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   style="stop-color:#ffffff;stop-opacity:0.00" />
      <stop offset="25%"  style="stop-color:#8080ff;stop-opacity:0.07" />
      <stop offset="50%"  style="stop-color:#ff6020;stop-opacity:0.10" />
      <stop offset="75%"  style="stop-color:#20ff80;stop-opacity:0.06" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.00" />
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="1024" height="1024" rx="224" ry="224" fill="url(#bgGrad)"/>
  <!-- Rainbow shine -->
  <rect width="1024" height="1024" rx="224" ry="224" fill="url(#shineGrad)"/>
  <!-- Orange O — circle outline, left-center -->
  <circle cx="295" cy="512" r="160" fill="none" stroke="#FF6B00" stroke-width="80"/>
  <!-- FIX white text, right of O -->
  <text
    x="690" y="580"
    font-family="'Arial Black', 'Impact', 'Helvetica Neue', Arial, sans-serif"
    font-weight="900"
    font-size="318"
    fill="#FFFFFF"
    text-anchor="middle"
    letter-spacing="-10"
  >FIX</text>
</svg>
