<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="apple-mobile-web-app-title" content="OFIX" />
    <meta name="theme-color" content="#F5F0E8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>OFIX</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=optional" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=optional"></noscript>
  </head>
  <body>
    <div id="root">
      <!-- Shell de carga estático: pinta de inmediato (FCP) mientras carga el JS.
           Imita el header real (OFIX arriba-izquierda) para que el logo no se
           reposicione al montar React → evita layout shift. No es un splash. -->
      <div style="position:fixed;inset:0;background:#F5F0E8">
        <div style="background:#FFFFFF;box-shadow:0 1px 0 #EDE8DE;padding:calc(14px + env(safe-area-inset-top)) 16px 12px">
          <div style="font-family:'DM Sans',system-ui,sans-serif;font-weight:800;font-size:26px;letter-spacing:-1px;color:#1A1712;line-height:1.2;padding-bottom:10px">
            O<span style="color:#FF6B00">FIX</span>
          </div>
          <!-- Placeholder de la barra de búsqueda: iguala la altura del header real
               para que el contenido no salte al montar React (evita CLS). -->
          <div style="height:48px;background:#F5F1E8;border:1.5px solid #E5DECF;border-radius:15px"></div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
